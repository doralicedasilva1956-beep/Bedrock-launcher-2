name: Launcher Bedrock v7a Final
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar Projeto Android Completo
        run: |
          # 1. Criar estrutura de pastas
          mkdir -p app/src/main/java/com/projeto/bedrock/launcher
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/res/values

          # 2. Configuração da Raiz do Projeto
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 3. Configuração do App (Android 8.0 + ARMv7a)
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 33
              namespace "com.projeto.bedrock.launcher"
              defaultConfig {
                  applicationId "com.projeto.bedrock.launcher"
                  minSdkVersion 26
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0"
                  ndk { abiFilters "armeabi-v7a" }
              }
          }
          EOF

          # 4. Manifesto (Resolve erro de análise do pacote)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com">
              <application android:label="Bedrock Launcher v7a" android:extractNativeLibs="true">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. Código Java (MainActivity)
          cat <<EOF > app/src/main/java/com/projeto/bedrock/launcher/MainActivity.java
          package com.projeto.bedrock.launcher;
          import android.app.NativeActivity;
          public class MainActivity extends NativeActivity {}
          EOF

          # 6. Strings básicas
          echo '<resources><string name="app_name">Bedrock Launcher</string></resources>' > app/src/main/res/values/strings.xml

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilar APK
        run: |
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-v7a-Android8
          path: app/build/outputs/apk/debug/*.apk
