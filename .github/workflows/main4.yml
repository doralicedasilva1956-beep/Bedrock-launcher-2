name: Gerar e Compilar Launcher Bedrock v7a

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar Estrutura do Projeto (Tudo em 1)
        run: |
          # Criar pastas
          mkdir -p app/src/main/java/com/projeto/bedrock/launcher
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/res/values

          # 1. build.gradle (Configurado para ARMv7a e Android 8.0)
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 33
              defaultConfig {
                  applicationId "com.projeto.bedrock.launcher"
                  minSdkVersion 26
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0-ARMv7a"
                  ndk { abiFilters "armeabi-v7a" }
              }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          EOF

          # 2. AndroidManifest.xml (O que resolve o erro de análise)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com" package="com.projeto.bedrock.launcher">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <application android:label="Bedrock Launcher v7a" android:extractNativeLibs="true" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 3. MainActivity.java (Ponte baseada no Pojav)
          cat <<EOF > app/src/main/java/com/projeto/bedrock/launcher/MainActivity.java
          package com.projeto.bedrock.launcher;
          import android.app.NativeActivity;
          import android.os.Bundle;
          import android.util.Log;

          public class MainActivity extends NativeActivity {
              static {
                  try {
                      System.loadLibrary("fmod");
                      System.loadLibrary("minecraftpe");
                  } catch (UnsatisfiedLinkError e) {
                      Log.e("Launcher", "Erro: Coloque a libminecraftpe.so na pasta de libs");
                  }
              }
          }
          EOF

          # 4. CMakeLists.txt (Linker C++)
          cat <<EOF > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.10.2)
          project("bedrock_core")
          add_library(native-lib SHARED native-lib.cpp)
          EOF

          # 5. native-lib.cpp (Código C++ vazio para build)
          echo '#include <jni.h>' > app/src/main/cpp/native-lib.cpp

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Gerar Gradle Wrapper
        run: gradle wrapper

      - name: Compilar APK
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK Final
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-Bedrock-ARMv7a
          path: app/build/outputs/apk/debug/*.apk
